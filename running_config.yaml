system:
  device: "auto" # "cuda", "cpu", "auto"
  use_opponent_model: True

train:
  episodes_per_batch: 256
  num_iterations: 100
  mini_batch_size: 64
  lr: 0.0003
  gamma: 0.99

model:
  agent:
    hidden_layers: [256, 256, 128]
    use_layer_norm: true
  opponent_predictor:
    hidden_layers: [128, 128]
    use_layer_norm: false

ppo:
  clip_param: 0.2
  policy_epochs: 5
  value_epochs: 5
  gae_lambda: 0.95
  entropy_coef: 0.01

opponent:
  style: "random" # "aggressive", "conservative", "random"
  predictor_lr: 0.001

wandb:
  project: "Texas-Holdem-PPO-selfplay"

selfplay:
  enabled: True
  update_every: 20 # Update opponent model every N iterations

save:
  save_dir: "models/"